name: Docker

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:

env:
  IMAGE_NAME: syncstreamapi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          if [ -f docker-compose.test.yml ]; then
            docker compose --file docker-compose.test.yml build
            docker compose --file docker-compose.test.yml run sut
          else
            docker build . --file Dockerfile
          fi

  push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: prep
        run: |
          # Lowercase owner and derive image IDs
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          API_IMAGE="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          SFU_IMAGE="ghcr.io/${OWNER}/syncstreamsfu"

          # Derive version from git ref
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # Strip "v" prefix from tag names
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo "$VERSION" | sed -e 's/^v//')
          # Use "latest" for master branch
          [ "$VERSION" == "master" ] && VERSION=latest

          echo "api_image=${API_IMAGE}" >> $GITHUB_OUTPUT
          echo "sfu_image=${SFU_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.api_image }}:${{ steps.prep.outputs.version }}
          cache-from: type=registry,ref=${{ steps.prep.outputs.api_image }}:cache
          cache-to: type=registry,ref=${{ steps.prep.outputs.api_image }}:cache,mode=max

      - name: Build and push SFU
        uses: docker/build-push-action@v6
        with:
          context: ./sfu
          file: ./sfu/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.sfu_image }}:${{ steps.prep.outputs.version }}
          cache-from: type=registry,ref=${{ steps.prep.outputs.sfu_image }}:cache
          cache-to: type=registry,ref=${{ steps.prep.outputs.sfu_image }}:cache,mode=max
